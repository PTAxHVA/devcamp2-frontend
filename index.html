<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <!-- Set the theme before first paint so a dark-mode user never sees a light flash. -->
    <script>
      ;(function () {
        try {
          document.documentElement.setAttribute(
            'data-theme',
            localStorage.getItem('vora:theme') === 'dark' ? 'dark' : 'light',
          )
        } catch (e) {}
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>VORA — Verified Online Roadmap Advisor</title>
    <meta
      name="description"
      content="VORA gives beginner web developers a curated, role-specific learning roadmap with quiz-verified progress."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://devcamp2-frontend.vercel.app/" />
    <meta property="og:title" content="VORA — Verified Online Roadmap Advisor" />
    <meta
      property="og:description"
      content="A curated, role-specific learning roadmap with quiz-verified progress for beginner web developers."
    />
    <meta property="og:image" content="https://devcamp2-frontend.vercel.app/roadmap-preview.png" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
